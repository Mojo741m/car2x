<!DOCTYPE html>
<html>
<head>
    <title>ESP32-C5 ETSI ITS Live-Karte</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100vh; height: 100dvh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0d1117; color: #c9d1d9; display: flex; flex-direction: column; overflow: hidden; }
        header { background: #161b22; padding: 12px 15px; display: flex; flex-direction: column; gap: 8px; border-bottom: 1px solid #30363d; z-index: 1000; padding-top: max(12px, env(safe-area-inset-top)); }
        h1 { margin: 0; font-size: 1.1rem; color: #58a6ff; display: flex; align-items: center; justify-content: space-between; }
        .controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .btn { background: #238636; color: #fff; border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
        .btn-ble { background: #1f6feb; }
        .btn-sec { background: #30363d; color: #c9d1d9; }
        .status { font-size: 0.8rem; background: #21262d; padding: 6px 10px; border-radius: 20px; border: 1px solid #30363d; color: #58a6ff; flex: 1; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; text-decoration: underline; font-weight: 600; }
        #map { flex: 1; width: 100%; height: 100%; }

        /* Modal Overlay für Stationen-Liste */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(4px); z-index: 2000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .modal-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; width: 100%; max-width: 480px; max-height: 80vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modal-header { padding: 15px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; background: #21262d; }
        .modal-header h2 { margin: 0; font-size: 1.1rem; color: #58a6ff; }
        .modal-close { background: none; border: none; color: #8b949e; font-size: 1.5rem; cursor: pointer; line-height: 1; }
        .modal-body { padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .station-item { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 12px; display: flex; flex-direction: column; gap: 6px; }
        .station-title { font-weight: 600; font-size: 0.95rem; color: #c9d1d9; display: flex; justify-content: space-between; }
        .badge-on { background: rgba(35, 134, 54, 0.2); color: #3fb950; border: 1px solid #238636; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; }
        .badge-off { background: rgba(210, 153, 34, 0.2); color: #d29922; border: 1px solid #d29922; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; }
        .station-details { font-size: 0.8rem; color: #8b949e; display: flex; gap: 15px; flex-wrap: wrap; }
    </style>
</head>
<body>
    <header>
        <h1>🚗 ETSI ITS Car2X <span id="stat" class="status" onclick="openModal()">Bereit</span></h1>
        <div class="controls">
            <button class="btn btn-ble" onclick="connectBLE()">📡 Bluetooth verbinden</button>
            <button class="btn btn-sec" onclick="setManualMode()">📍 Ort wählen</button>
            <button class="btn" onclick="centerMap()">🎯 Zentrieren</button>
        </div>
    </header>
    <div id="map"></div>

    <!-- Modal für Liste der ITS-Stationen -->
    <div id="stationModal" class="modal-overlay" onclick="closeModalOnOuterClick(event)">
        <div class="modal-card">
            <div class="modal-header">
                <h2>📡 Active ITS-Stationen</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalList" class="modal-body">
                <div style="text-align: center; color: #8b949e; padding: 20px;">Keine Daten empfangen. Verbinde Bluetooth!</div>
            </div>
        </div>
    </div>

    <script>
        var map = L.map('map', { zoomControl: false }).setView([51.1657, 10.4515], 6);
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap', maxZoom: 19 }).addTo(map);

        var markers = {};
        var featureGroup = L.featureGroup().addTo(map);
        var userMarker = null;
        var userLat = null, userLon = null;
        var bleDevice, gpsChar;
        var lastReceivedData = null;

        function updateUserMarker(lat, lon) {
            userLat = lat; userLon = lon;
            var popup = '<div style="color:#000"><b>📍 Empfänger / iPhone</b></div>';
            if (userMarker) { userMarker.setLatLng([lat, lon]); }
            else { userMarker = L.circleMarker([lat, lon], { radius: 12, fillColor: '#238636', color: '#ffffff', weight: 3, fillOpacity: 1.0 }).addTo(map).bindPopup(popup); map.setView([lat, lon], 15); }
            
            if (gpsChar) {
                var str = lat.toFixed(6) + ',' + lon.toFixed(6);
                gpsChar.writeValue(new TextEncoder().encode(str)).catch(e => console.log(e));
            }
        }

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(function(pos) { updateUserMarker(pos.coords.latitude, pos.coords.longitude); },
            function(err) { console.log(err); }, { enableHighAccuracy: true });
        }

        var manualSelecting = false;
        function setManualMode() { manualSelecting = true; alert('Klicke auf der Karte auf deinen Standort!'); }
        map.on('click', function(e) { if (manualSelecting) { updateUserMarker(e.latlng.lat, e.latlng.lng); manualSelecting = false; } });
        function centerMap() { if (userLat && userLon) map.setView([userLat, userLon], 15); }

        function openModal() { document.getElementById('stationModal').style.display = 'flex'; renderModalList(); }
        function closeModal() { document.getElementById('stationModal').style.display = 'none'; }
        function closeModalOnOuterClick(e) { if (e.target.id === 'stationModal') closeModal(); }

        function renderModalList() {
            var container = document.getElementById('modalList');
            if (!lastReceivedData || !lastReceivedData.v || lastReceivedData.v.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #8b949e; padding: 20px;">Aktuell keine aktiven ITS-Stationen im Speicher.</div>';
                return;
            }
            var html = '';
            lastReceivedData.v.forEach(v => {
                var isVisible = (v.vp === 1);
                var badge = isVisible ? '<span class="badge-on">🟢 Auf Karte</span>' : '<span class="badge-off">🟡 Ausgeblendet (Kein GPS)</span>';
                html += '<div class="station-item">' +
                    '<div class="station-title"><span>' + v.t + '</span>' + badge + '</div>' +
                    '<div class="station-details">' +
                    '<span>ID: <b>' + v.i + '</b></span>' +
                    '<span>Tempo: <b>' + v.s + ' km/h</b></span>' +
                    '<span>Signal: <b>' + v.r + ' dBm</b></span>' +
                    '</div></div>';
            });
            container.innerHTML = html;
        }

        async function connectBLE() {
            try {
                document.getElementById('stat').innerText = 'Suche Bluetooth...';
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'Car2X-Sniffer' }],
                    optionalServices: ['12345678-1234-5678-1234-56789abcdef0']
                });
                const server = await bleDevice.gatt.connect();
                const service = await server.getPrimaryService('12345678-1234-5678-1234-56789abcdef0');
                const vehChar = await service.getCharacteristic('12345678-1234-5678-1234-56789abcdef1');
                gpsChar = await service.getCharacteristic('12345678-1234-5678-1234-56789abcdef2');
                
                await vehChar.startNotifications();
                vehChar.addEventListener('characteristicvaluechanged', (e) => {
                    const str = new TextDecoder().decode(e.target.value);
                    try {
                        const data = JSON.parse(str);
                        lastReceivedData = data;
                        document.getElementById('stat').innerText = 'ITS-Stationen: ' + data.c + ' 🔍';
                        renderModalList();
                        var activeIds = {};
                        data.v.forEach(v => {
                            if (v.vp === 1) {
                                activeIds[v.i] = true;
                                var color = (v.t.indexOf('Ampel') !== -1 || v.t.indexOf('RSU') !== -1) ? '#e3b341' : '#1f6feb';
                                var popup = '<div style="color:#000"><b>' + v.t + '</b><br>ID: ' + v.i + '<br>Geschwindigkeit: ' + v.s + ' km/h<br>Signal: ' + v.r + ' dBm</div>';
                                if (markers[v.i]) { markers[v.i].setLatLng([v.la, v.lo]).setPopupContent(popup); }
                                else { var m = L.circleMarker([v.la, v.lo], { radius: 10, fillColor: color, color: '#ffffff', weight: 2, fillOpacity: 0.9 }).bindPopup(popup); markers[v.i] = m; featureGroup.addLayer(m); }
                            }
                        });
                        for (var id in markers) { if (!activeIds[id]) { featureGroup.removeLayer(markers[id]); map.removeLayer(markers[id]); delete markers[id]; } }
                        map.invalidateSize();
                    } catch (ex) {}
                });
                document.getElementById('stat').innerText = 'BT Verbunden!';
            } catch (e) {
                document.getElementById('stat').innerText = 'BT Fehler: ' + e;
            }
        }
    </script>
</body>
</html>
